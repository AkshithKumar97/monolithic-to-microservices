spring.application.name=spring-cloud-gateway

server.port=8085

#Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
#eureka.instance.hostname=localhost

#Zipkin
management.tracing.sampling.probability=1.0

# Spring Cloud Gateway 5 + gateway-server-webflux: routes bind under server.webflux (not spring.cloud.gateway.routes)
spring.cloud.gateway.server.webflux.routes[0].id=JOB_SERVICE
spring.cloud.gateway.server.webflux.routes[0].uri=lb://JOB-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/jobs/**
#spring.cloud.gateway.server.webflux.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webflux.routes[1].id=COMPANY_SERVICE
spring.cloud.gateway.server.webflux.routes[1].uri=lb://COMPANY-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/companies/**

spring.cloud.gateway.server.webflux.routes[2].id=REVIEW_SERVICE
spring.cloud.gateway.server.webflux.routes[2].uri=lb://REVIEW-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/reviews/**

spring.cloud.gateway.server.webflux.routes[3].id=EUREKA_SERVICE
spring.cloud.gateway.server.webflux.routes[3].uri=http://localhost:8761
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/eureka/main/**
spring.cloud.gateway.server.webflux.routes[3].filters[0]=SetPath=/


spring.cloud.gateway.server.webflux.routes[4].id=EUREKA_SERVICE_STATIC
spring.cloud.gateway.server.webflux.routes[4].uri=http://localhost:8761
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/eureka/css/**, /eureka/js/**, /eureka/images/**, /eureka/fonts/**
#spring.cloud.gateway.server.webflux.routes[4].filters[0]=SetPath=/

spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true